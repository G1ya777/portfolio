<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>G1ya777 — Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Syne", sans-serif;
      }
      .mono {
        font-family: "DM Mono", monospace;
      }
    </style>
  </head>
  <body class="bg-[#0d0d0d] text-[#e8e4dc] min-h-screen flex flex-col">
    <div class="flex flex-col md:flex-row flex-1 min-h-screen">
      <!-- Sidebar -->
      <aside
        class="md:w-[38%] md:max-w-[480px] md:min-w-[260px] md:sticky md:top-0 md:h-screen flex flex-col justify-between px-6 py-10 md:px-12 md:py-14 border-b md:border-b-0 md:border-r border-[#1a1a1a] bg-[#0d0d0d]"
      >
        <div id="sidebar-top"></div>

        <footer class="mono text-xs text-[#2a2a2a] mt-8 md:mt-0">
          G1ya777 &mdash; 2026
        </footer>
      </aside>

      <!-- Main -->
<main class="flex-1 px-6 py-10 md:px-14 md:py-14 md:overflow-y-auto">

  <!-- Header row -->
  <div class="flex items-center justify-between mb-8">
    <p class="mono text-xs text-[#333] tracking-widest uppercase">
      Projects
    </p>

    <button
      onclick="downloadCV()"
      class="mono text-xs text-[#555] border border-[#1e1e1e] px-4 py-2 rounded-lg hover:text-[#e8e4dc] hover:border-[#444] hover:bg-[#1a1a1a] transition-all"
    >
      Download CV
    </button>
  </div>

  <!-- Projects -->
  <div id="projects-container" class="flex flex-col gap-5"></div>

</main>

    <script src="stack.js"></script>
    <script src="projects.js"></script>
    <script src="about.js"></script>
    <script src="cv.js"></script>
  </body>
</html>
